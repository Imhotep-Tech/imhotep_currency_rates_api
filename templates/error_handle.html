{% extends "layout.html" %}

{% block body %}
<div class="flex min-h-[70vh] items-center justify-center px-4 py-8">
  <div class="w-full max-w-md text-center space-y-6">
    <div class="space-y-2">
      <h1 class="font-display text-8xl font-extrabold bg-gradient-to-br from-brand-400 to-indigo-500 bg-clip-text text-transparent leading-none">{{error_code}}</h1>
      <h2 class="font-display text-2xl font-bold text-white tracking-tight">Uh-oh! Page Not Found</h2>
      <p class="text-sm text-gray-400 max-w-xs mx-auto leading-relaxed">{{ error_description }}</p>
    </div>

    <div>
      <a href="/" class="inline-flex items-center justify-center rounded-lg bg-gradient-to-r from-brand-600 to-indigo-600 px-6 py-3 text-sm font-semibold text-white shadow-md hover:from-brand-500 hover:to-indigo-500 transition-all duration-200">
        <i class="fa-solid fa-house mr-1.5"></i> Return Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
