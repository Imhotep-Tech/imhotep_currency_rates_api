{% extends "layout.html" %}

{% block body %}
<div class="flex min-h-[70vh] items-center justify-center px-4 py-8">
  <div class="w-full max-w-md space-y-6">
    {% include 'back.html' %}
    
    <div class="text-center space-y-2">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br from-brand-500 to-indigo-600 shadow-md">
        <i class="fa-solid fa-user text-white text-xl"></i>
      </div>
      <h2 class="font-display text-2xl font-extrabold text-white tracking-tight">Choose Username</h2>
      <p class="text-xs text-gray-400">Configure a unique username for your Google-linked profile.</p>
    </div>

    {% if error %}
      <div class="rounded-lg border border-rose-800 bg-rose-950/20 p-4 text-rose-400 text-sm text-center shadow-md animate-fade-in flex items-center justify-center gap-2">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error }}</span>
      </div>
    {% endif %}
    {% if error_existing %}
      <div class="rounded-lg border border-amber-800 bg-amber-950/20 p-4 text-amber-400 text-sm text-center shadow-md animate-fade-in flex items-center justify-center gap-2">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>{{ error_existing }}</span>
      </div>
    {% endif %}

    <div class="rounded-2xl border border-gray-800 bg-[#0F172A]/85 p-6 shadow-xl backdrop-blur-md space-y-5">
      <form action="/add_username_google_login" method="post" class="space-y-4">
        {{ form.hidden_tag() }}
        
        <div class="space-y-1.5">
          <label class="block text-xs font-semibold text-gray-400">Username</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"><i class="fa-regular fa-user"></i></span>
            <input type="text" name="user_username" required class="w-full rounded-lg border border-gray-800 bg-[#0B0F19] pl-10 pr-4 py-2.5 text-sm font-medium text-white placeholder-gray-600 focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500 transition-colors" placeholder="johndoe">
          </div>
        </div>

        <button type="submit" class="w-full inline-flex items-center justify-center rounded-lg bg-gradient-to-r from-brand-600 to-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-md hover:from-brand-500 hover:to-indigo-500 transition-all duration-200">
          <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i> Continue
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
