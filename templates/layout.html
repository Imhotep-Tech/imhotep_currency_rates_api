<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Configure Tailwind custom theme
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            },
            colors: {
              brand: {
                50: '#f5f3ff',
                100: '#ede9fe',
                200: '#ddd6fe',
                300: '#c4b5fd',
                400: '#a78bfa',
                500: '#8b5cf6',
                600: '#7c3aed',
                700: '#6d28d9',
                800: '#5b21b6',
                900: '#4c1d95',
              }
            }
          }
        }
      }
      
      // Fallback: if Tailwind isn't available, inject from unpkg CDN
      window.addEventListener('error', function(e){
        if(e && e.target && e.target.tagName === 'SCRIPT' && e.target.src.includes('cdn.tailwindcss.com')){
          var s = document.createElement('script');
          s.src = 'https://unpkg.com/tailwindcss-cdn@3.4.17/tailwindcss.js';
          document.head.appendChild(s);
        }
      }, true);
    </script>
    <link rel="shortcut icon" href="{{ url_for('static', filename='imhotep_exchange_rate_api.jpeg')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <meta name="description" content="Imhotep Exchange Rate API - Get Currency Rates Easily And Free.">
    <meta name="keywords" content="Imhotep Exchange Rate API, Imhotep Currency Rate API, Imhotep Exchange API, Imhotep API, Currency Rate API, Free Currency Rate API, Exchange Rate API, Free Exchange Rate API">
    <title>Imhotep Exchange Rate API</title>
    <meta name="google-site-verification" content="t0C7WT8MTJ1gP87eh4Y7U9bkqPxRAnm1JxYLnDix6_Y" />
</head>
<body class="min-h-screen bg-[#0B0F19] text-gray-200 flex flex-col font-sans antialiased selection:bg-brand-500 selection:text-white">
    <header class="sticky top-0 z-50 bg-[#0F172A]/85 backdrop-blur-md border-b border-gray-800/80">
        {% include 'nav.html' %}
    </header>

    <!-- Loading Screen -->
    <div id="loading-overlay" class="fixed inset-0 hidden items-center justify-center bg-[#0B0F19]/70 backdrop-blur-md z-50">
        <div class="flex flex-col items-center gap-3">
            <div class="h-12 w-12 animate-spin rounded-full border-4 border-gray-800 border-t-brand-500 shadow-md shadow-brand-500/20"></div>
            <p class="text-sm font-medium text-gray-400">Loading...</p>
        </div>
    </div>

    <main class="flex-1">
        <div class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8 py-6">
            {% block content %}
                {% block body %}{% endblock %}
            {% endblock %}
        </div>
    </main>

    <footer class="border-t border-gray-800/85 bg-[#0F172A]/60">
        {% include 'footer.html' %}
    </footer>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
